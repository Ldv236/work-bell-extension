<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Work Bell</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 12px; width: 340px; }
    .title { font-weight: 700; margin-bottom: 8px; }
    .line { margin: 6px 0; }
    .muted { color: #666; font-size: 12px; white-space: pre-line; }
    .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    button { padding: 8px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="title">Work Bell</div>
  <div id="status" class="line">Загрузка…</div>
  <div id="exercise" class="line muted"></div>
  <div id="next" class="line muted"></div>
  <div class="btns">
    <button id="doneBtn">Сделал(а)</button>
    <button id="snoozeBtn">Отложить 5м</button>
    <button id="replayBtn">Повторить звук</button>
    <button id="openOptionsBtn">Настройки</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
