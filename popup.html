<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Work Bell</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ec;
      --panel: #fffdf8;
      --text: #222222;
      --muted: #6b645c;
      --accent: #b15a2b;
      --accent-dark: #8d4018;
      --accent-soft: #f6dcbf;
      --border: #ded4c4;
      --warn: #fff0cc;
      --warn-border: #efc56d;
      --soft: #ece2d5;
    }

    body {
      margin: 0;
      width: 360px;
      background: linear-gradient(180deg, #f6ebd7 0%, var(--bg) 100%);
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
    }

    body.reminder {
      width: auto;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(177, 90, 43, 0.18), transparent 30%),
        linear-gradient(180deg, #fff7ea 0%, #f6e7d1 100%);
    }

    .wrap {
      padding: 16px;
    }

    body.reminder .wrap {
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
    }

    .title {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 10px 28px rgba(72, 49, 25, 0.08);
    }

    body.reminder .card {
      max-width: 520px;
      margin: 0 auto;
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(177, 90, 43, 0.28);
      box-shadow: 0 24px 48px rgba(72, 49, 25, 0.16);
    }

    .line {
      margin: 0 0 10px;
      line-height: 1.4;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .alert {
      padding: 10px;
      border-radius: 10px;
      background: var(--warn);
      border: 1px solid var(--warn-border);
      font-weight: 700;
    }

    body.reminder .title {
      font-size: 30px;
      margin-bottom: 8px;
      text-align: center;
    }

    body.reminder .subtitle {
      max-width: 420px;
      margin: 0 auto 20px;
      font-size: 15px;
      text-align: center;
    }

    body.reminder .alert {
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 18px;
      text-align: center;
    }

    #exercise {
      min-height: 22px;
      font-weight: 600;
    }

    body.reminder #exercise {
      min-height: 0;
      margin: 0 0 16px;
      padding: 18px 20px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--accent-soft) 0%, #fff4e5 100%);
      border: 1px solid rgba(177, 90, 43, 0.24);
      font-size: 28px;
      line-height: 1.25;
      text-align: center;
      font-weight: 800;
    }

    body.reminder #next {
      font-size: 15px;
      text-align: center;
      margin-bottom: 18px;
    }

    .today-box {
      margin-top: 12px;
      padding: 10px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: #fffaf2;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-line;
    }

    .today-box.hidden {
      display: none;
    }

    .tip {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    body.reminder .btns {
      gap: 12px;
      margin-top: 0;
    }

    body.reminder .pair {
      gap: 12px;
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
      font: inherit;
    }

    body.reminder button {
      min-height: 58px;
      font-size: 18px;
      border-radius: 14px;
    }

    body.reminder #doneBtn {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      box-shadow: 0 14px 22px rgba(177, 90, 43, 0.22);
    }

    button.secondary {
      background: var(--soft);
      color: var(--text);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <h1 id="title" class="title">Work Bell</h1>
      <p id="subtitle" class="subtitle">Напоминание встать, размяться и сделать одно упражнение. Если вас нет за компьютером, голос продолжит повторяться до подтверждения.</p>
      <div class="card">
        <div id="status" class="line">Загрузка...</div>
        <div id="exercise" class="line"></div>
        <div id="next" class="line muted"></div>
        <div id="todayHistory" class="today-box hidden"></div>
        <div class="btns">
          <div class="pair">
            <button id="doneBtn" disabled>Сделано</button>
            <button id="skipBtn" class="secondary" disabled>Пропущу</button>
          </div>
          <button id="todayBtn" class="secondary">Сегодня</button>
          <button id="openOptionsBtn" class="secondary">Настройки</button>
        </div>
        <div id="tip" class="tip">"Сделано" учитывает упражнение в статистике за день. "Пропущу" закрывает текущее напоминание без учета.</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
