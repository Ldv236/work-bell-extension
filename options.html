<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Work Bell — настройки</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; max-width: 900px; }
    .row { margin: 10px 0; }
    label { display: inline-block; min-width: 260px; }
    input[type="number"] { width: 110px; }
    textarea { width: 100%; height: 180px; }
    .hint { color: #555; font-size: 12px; margin-top: 6px; }
    .btns { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
    button { padding: 8px 12px; cursor: pointer; }
    .ok { color: #0a7; }
  </style>
</head>
<body>
  <h2>Work Bell — настройки</h2>

  <div class="row">
    <label>Время с:</label>
    <input id="startTime" type="time" />
  </div>

  <div class="row">
    <label>Время до:</label>
    <input id="endTime" type="time" />
  </div>

  <div class="row">
    <label>Интервал (мин):</label>
    <input id="intervalMinutes" type="number" min="5" step="5" />
    <div class="hint">Например 60 = раз в час.</div>
  </div>

  <div class="row">
    <label>Тихий режим (без звука):</label>
    <input id="quietMode" type="checkbox" />
  </div>

  <div class="row">
    <label>Громкость:</label>
    <input id="volume" type="range" min="0" max="1" step="0.05" />
  </div>

  <div class="row">
    <label>Уведомление висит до ответа:</label>
    <input id="requireInteraction" type="checkbox" />
    <div class="hint">Если включено, уведомление не исчезает само.</div>
  </div>

  <div class="row">
    <label>Считать “опозданием” после (мин):</label>
    <input id="lateAfterMinutes" type="number" min="1" step="1" />
    <div class="hint">Если подтвердил позже, счётчик пропусков не уменьшается.</div>
  </div>

  <hr />

  <div class="row">
    <label>Список упражнений (по одному на строку):</label>
    <textarea id="exercises"></textarea>
    <div class="hint">Каждый сигнал выбирает случайное упражнение из списка.</div>
  </div>

  <div class="btns">
    <button id="save">Сохранить</button>
    <button id="testSound">Проверить звук</button>
    <button id="replaySound">Повторить сигнал</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
